<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — Ender List</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg-card: rgba(10,15,30,0.68); --bg-card-h: rgba(12,18,38,0.84);
  --bg-panel: rgba(8,12,26,0.78); --bg-nav: rgba(4,7,16,0.94);
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.13);
  --green: #4ade80; --green-d: #22c55e; --pink: #e879a0; --teal: #2dd4bf;
  --amber: #fbbf24; --red: #f87171; --blue: #38bdf8;
  --text: #eef2ff; --text-m: #8b9ab5; --text-d: #435068;
  --gold: #fbbf24; --vip: #c084fc; --r: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Outfit", sans-serif; font-size: 14px; min-height: 100vh;
  overflow-x: hidden; color: var(--text);
  background: #060a14;
}
body::before {
  content: ""; position: fixed; inset: 0; z-index: 0; opacity: 0.028; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px;
}
.page-wrap { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }
nav {
  background: var(--bg-nav); backdrop-filter: blur(28px) saturate(1.5);
  border-bottom: 1px solid rgba(255,255,255,0.07); position: sticky; top: 0; z-index: 200;
}
.nav-inner {
  max-width: 1100px; margin: 0 auto; padding: 0 20px;
  height: 58px; display: flex; align-items: center; gap: 18px;
}
.logo-wrap { display: flex; align-items: center; text-decoration: none; gap: 10px; flex-shrink: 0; }
.logo-svg { width: 32px; height: 32px; }
.logo-t { font-family: "Nunito",sans-serif; font-weight: 900; font-size: 18px; color: var(--green); letter-spacing: 0.04em; text-shadow: 0 0 16px rgba(74,222,128,0.5); }
.nav-links { display: flex; gap: 2px; margin-left: auto; }
.nav-link {
  font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.50);
  text-decoration: none; padding: 6px 13px; border-radius: 6px;
  transition: color .15s ease, background .15s ease; cursor: pointer;
}
.nav-link:hover { color: #fff; background: rgba(255,255,255,0.08); }
.content { max-width: 900px; margin: 0 auto; padding: 32px 20px 64px; flex: 1; }
.glass {
  background: var(--bg-panel); backdrop-filter: blur(26px) saturate(1.5);
  border-radius: var(--r); border: 1px solid var(--border2);
  box-shadow: 0 8px 32px rgba(0,0,0,0.38), inset 0 1px 0 rgba(255,255,255,0.07);
  padding: 28px 32px;
}
h1 { font-family: "Nunito",sans-serif; font-size: 28px; font-weight: 900; letter-spacing: -0.03em; margin-bottom: 8px; }
h2 { font-family: "Nunito",sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -0.02em; margin: 28px 0 12px; color: var(--text); }
h3 { font-family: "Nunito",sans-serif; font-size: 16px; font-weight: 800; margin: 20px 0 8px; color: var(--text); }
p, li { color: var(--text-m); line-height: 1.75; margin-bottom: 10px; }
ul { padding-left: 20px; margin-bottom: 16px; }
a { color: var(--green); text-decoration: none; }
a:hover { text-decoration: underline; }
code {
  background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  padding: 2px 6px; border-radius: 4px; font-size: 13px; color: var(--teal);
}
pre {
  background: rgba(0,0,0,0.35); border: 1px solid var(--border2);
  border-radius: 8px; padding: 16px 20px; overflow-x: auto;
  margin: 12px 0 20px; font-size: 13px; line-height: 1.6; color: var(--text-m);
}
pre code { background: none; border: none; padding: 0; color: inherit; }
.label { font-size: 12px; font-weight: 700; color: var(--text-d); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
input[type="text"], input[type="url"], input[type="number"], input[type="password"], textarea, select {
  width: 100%; background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; color: #fff;
  font-family: "Outfit",sans-serif; font-size: 14px; outline: none;
  transition: border-color .15s ease, background .15s ease;
}
input:focus, textarea:focus, select:focus { border-color: rgba(74,222,128,0.45); background: rgba(255,255,255,0.08); }
textarea { resize: vertical; min-height: 100px; }
select { color-scheme: dark; cursor: pointer; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  font-family: "Nunito",sans-serif; font-size: 14px; font-weight: 800;
  background: linear-gradient(135deg, #4ade80, #22c55e); color: #031a09;
  padding: 12px 28px; border-radius: 10px; border: none; cursor: pointer;
  letter-spacing: 0.04em; text-transform: uppercase;
  box-shadow: 0 4px 16px rgba(74,222,128,0.35);
  transition: background .15s ease, box-shadow .15s ease, transform .15s cubic-bezier(.34,1.56,.64,1);
}
.btn:hover { background: linear-gradient(135deg, #86efac, #4ade80); box-shadow: 0 6px 22px rgba(74,222,128,0.55); transform: translateY(-1px); }
.btn:active { transform: scale(0.97); }
.btn-outline {
  background: transparent; border: 1px solid var(--border2); color: var(--text-m);
  box-shadow: none; font-weight: 700;
}
.btn-outline:hover { background: rgba(255,255,255,0.06); color: #fff; border-color: rgba(255,255,255,0.24); box-shadow: none; transform: translateY(-1px); }
.btn-red { background: linear-gradient(135deg, #f87171, #ef4444); box-shadow: 0 4px 16px rgba(239,68,68,0.3); }
.btn-red:hover { background: linear-gradient(135deg, #fca5a5, #f87171); box-shadow: 0 6px 22px rgba(239,68,68,0.45); }
.form-group { margin-bottom: 18px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(8,12,26,0.96); color: #fff;
  font-size: 13px; font-weight: 700; padding: 12px 24px; border-radius: 10px;
  border: 1px solid rgba(74,222,128,0.22);
  box-shadow: 0 8px 32px rgba(0,0,0,0.55);
  z-index: 9999; transition: transform .3s cubic-bezier(.34,1.56,.64,1);
}
.toast.show { transform: translateX(-50%) translateY(0); }
footer {
  max-width: 900px; margin: 0 auto; padding: 24px 20px 40px;
  display: flex; flex-wrap: wrap; gap: 24px; justify-content: space-between; align-items: center;
  border-top: 1px solid rgba(255,255,255,0.06);
}
footer a { font-size: 12px; color: var(--text-m); text-decoration: none; }
footer a:hover { color: #fff; text-decoration: none; }
@media (max-width: 600px) {
  .form-row { grid-template-columns: 1fr; }
  .glass { padding: 20px 16px; }
  .content { padding: 20px 12px 48px; }
}
</style>
<link rel="stylesheet" href="/css/global.css">
</head>
<body>
<div id="bg-layer"></div>
<div class="page-wrap">
<nav>
  <div class="nav-inner">
    <a class="logo-wrap" href="/">
      <svg class="logo-svg" viewBox="0 0 40 40" fill="none"><rect x="16" y="2" width="8" height="4" fill="#4ade80"/><rect x="12" y="6" width="4" height="4" fill="#4ade80"/><rect x="24" y="6" width="4" height="4" fill="#4ade80"/><rect x="8" y="10" width="4" height="4" fill="#4ade80"/><rect x="12" y="10" width="16" height="4" fill="#86efac"/><rect x="28" y="10" width="4" height="4" fill="#4ade80"/><rect x="6" y="14" width="4" height="4" fill="#22c55e"/><rect x="10" y="14" width="20" height="4" fill="#4ade80"/><rect x="30" y="14" width="4" height="4" fill="#22c55e"/><rect x="8" y="18" width="24" height="4" fill="#4ade80"/><rect x="10" y="22" width="20" height="4" fill="#22c55e"/><rect x="12" y="26" width="16" height="4" fill="#16a34a"/><rect x="14" y="30" width="12" height="4" fill="#15803d"/><rect x="16" y="34" width="8" height="4" fill="#166534"/></svg>
      <span class="logo-t">ENDER LIST</span>
    </a>
    <div class="nav-links">
      <a class="nav-link" href="/">Servers</a>
      <a class="nav-link" href="/faq">FAQ</a>
      <a class="nav-link" href="/api-docs">API</a>
      <a class="nav-link" href="/advertise">Advertise</a>
    </div>
  </div>
</nav>

<div class="content" style="max-width:1200px">
  <!-- Staff header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px">
    <div>
      <h1 style="margin-bottom:2px">Admin Dashboard</h1>
      <p id="staff-info" style="font-size:13px;color:var(--text-d)">Loading...</p>
    </div>
    <button class="btn btn-outline" onclick="staffLogout()" style="font-size:12px;padding:8px 18px">Logout</button>
  </div>

  <!-- Stats cards -->
  <div id="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px"></div>

  <!-- Tabs -->
  <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap" id="admin-tabs">
    <button class="tab-btn active" onclick="showTab('servers',this)">Servers</button>
    <button class="tab-btn" onclick="showTab('users',this)">Users</button>
    <button class="tab-btn" onclick="showTab('bans',this)">Bans</button>
    <button class="tab-btn" onclick="showTab('ads',this)">Ads</button>
    <button class="tab-btn" onclick="showTab('staff',this)">Staff</button>
    <button class="tab-btn" onclick="showTab('audit',this)">Audit Log</button>
  </div>
  <style>
    .tab-btn { font-size:12px;font-weight:800;padding:7px 18px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text-m);letter-spacing:0.04em;text-transform:uppercase;transition:all .12s ease; }
    .tab-btn:hover { background:rgba(255,255,255,0.08);color:var(--text); }
    .tab-btn.active { background:rgba(74,222,128,0.14);border-color:var(--green);color:var(--green); }
    .tbl { width:100%;border-collapse:collapse;font-size:13px; }
    .tbl th { text-align:left;padding:10px 12px;font-size:11px;font-weight:700;color:var(--text-d);text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid rgba(255,255,255,0.08); }
    .tbl td { padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--text-m); }
    .tbl tr:hover td { background:rgba(255,255,255,0.03); }
    .badge { font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase; }
    .badge-green { background:rgba(74,222,128,0.12);color:#4ade80;border:1px solid rgba(74,222,128,0.28); }
    .badge-red { background:rgba(248,113,113,0.12);color:#fca5a5;border:1px solid rgba(248,113,113,0.28); }
    .badge-purple { background:rgba(192,132,252,0.12);color:#d8b4fe;border:1px solid rgba(192,132,252,0.28); }
    .badge-amber { background:rgba(251,191,36,0.12);color:#fcd34d;border:1px solid rgba(251,191,36,0.28); }
    .sm-btn { font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text-m);transition:all .12s ease; }
    .sm-btn:hover { background:rgba(255,255,255,0.10);color:#fff; }
    .sm-btn-green { border-color:rgba(74,222,128,0.3);color:var(--green); }
    .sm-btn-green:hover { background:rgba(74,222,128,0.12); }
    .sm-btn-red { border-color:rgba(248,113,113,0.3);color:var(--red); }
    .sm-btn-red:hover { background:rgba(248,113,113,0.12); }
  </style>

  <div class="glass" style="padding:0;overflow:hidden">
    <!-- Servers tab -->
    <div id="tab-servers" class="tab-panel">
      <div style="padding:16px 20px;display:flex;gap:10px;align-items:center;border-bottom:1px solid rgba(255,255,255,0.06)">
        <input type="text" id="server-search" placeholder="Search servers..." style="max-width:300px" oninput="searchServers()">
      </div>
      <div id="servers-table" style="overflow-x:auto"></div>
    </div>

    <!-- Users tab -->
    <div id="tab-users" class="tab-panel" style="display:none">
      <div style="padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06)">
        <input type="text" id="user-search" placeholder="Search users..." style="max-width:300px" oninput="searchUsers()">
      </div>
      <div id="users-table" style="overflow-x:auto"></div>
    </div>

    <!-- Bans tab -->
    <div id="tab-bans" class="tab-panel" style="display:none">
      <div id="bans-table" style="overflow-x:auto;padding:4px 0"></div>
    </div>

    <!-- Ads tab -->
    <div id="tab-ads" class="tab-panel" style="display:none">
      <div style="padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06)">
        <button class="sm-btn sm-btn-green" onclick="showAdForm()">+ New Ad</button>
      </div>
      <div id="ad-form-wrap" style="display:none;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06)">
        <div class="form-row">
          <div class="form-group"><div class="label">Name</div><input type="text" id="ad-name"></div>
          <div class="form-group"><div class="label">Link URL</div><input type="url" id="ad-href"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><div class="label">Image URL</div><input type="url" id="ad-image"></div>
          <div class="form-group"><div class="label">Placement</div>
            <select id="ad-placement"><option value="banner">Banner (468×60)</option><option value="sidebar">Sidebar (300×250)</option></select>
          </div>
        </div>
        <button class="sm-btn sm-btn-green" onclick="createAd()">Create Ad</button>
        <button class="sm-btn" onclick="document.getElementById('ad-form-wrap').style.display='none'">Cancel</button>
      </div>
      <div id="ads-table" style="overflow-x:auto"></div>
    </div>

    <!-- Staff tab -->
    <div id="tab-staff" class="tab-panel" style="display:none">
      <div style="padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06)">
        <button class="sm-btn sm-btn-green" onclick="showStaffForm()">+ New Staff</button>
      </div>
      <div id="staff-form-wrap" style="display:none;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06)">
        <div class="form-row">
          <div class="form-group"><div class="label">Username</div><input type="text" id="sf-user"></div>
          <div class="form-group"><div class="label">Password (min 8)</div><input type="password" id="sf-pass"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><div class="label">Display Name</div><input type="text" id="sf-name"></div>
          <div class="form-group"><div class="label">Role</div>
            <select id="sf-role"><option value="moderator">Moderator</option><option value="admin">Admin</option></select>
          </div>
        </div>
        <div class="form-group">
          <div class="label">Permissions</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap" id="sf-perms"></div>
        </div>
        <button class="sm-btn sm-btn-green" onclick="createStaff()">Create Staff</button>
        <button class="sm-btn" onclick="document.getElementById('staff-form-wrap').style.display='none'">Cancel</button>
      </div>
      <div id="staff-table" style="overflow-x:auto"></div>
    </div>

    <!-- Audit tab -->
    <div id="tab-audit" class="tab-panel" style="display:none">
      <div id="audit-table" style="overflow-x:auto"></div>
    </div>
  </div>
</div>

<script>
const API = (path, opts={}) => fetch("/admin" + path, {headers:{"Content-Type":"application/json"}, ...opts}).then(r=>r.json());
let staffPerms = [];
const PERMS = ["feature_servers","ban_servers","ban_users","manage_ads","view_audit"];

// Load staff info
(async () => {
  const me = await API("/me");
  document.getElementById("staff-info").textContent = `${me.display_name || me.username} · ${me.role}`;
  staffPerms = me.permissions || [];
  if (me.role === "owner" || me.role === "admin") staffPerms = PERMS; // full access
})();

// Stats
(async () => {
  const s = await API("/stats");
  const grid = document.getElementById("stats-grid");
  const items = [
    ["Servers", s.total_servers, "var(--green)"],
    ["Online", s.online_servers, "var(--teal)"],
    ["Players", s.total_players, "var(--blue)"],
    ["Users", s.total_users, "var(--text)"],
    ["Votes", s.total_votes, "var(--amber)"],
    ["Bans", s.active_bans, "var(--red)"],
    ["Featured", s.featured_servers, "var(--vip)"],
    ["Ads", s.active_ads, "var(--pink)"],
  ];
  grid.innerHTML = items.map(([l,v,c]) => `
    <div class="glass" style="padding:16px;text-align:center">
      <div style="font-size:11px;font-weight:700;color:var(--text-d);text-transform:uppercase;letter-spacing:0.06em">${l}</div>
      <div style="font-family:Nunito,sans-serif;font-size:24px;font-weight:900;color:${c};margin-top:4px">${(v||0).toLocaleString()}</div>
    </div>`).join("");
})();

// Tabs
function showTab(name, btn) {
  document.querySelectorAll(".tab-panel").forEach(p => p.style.display = "none");
  document.getElementById("tab-" + name).style.display = "";
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  if (btn) btn.classList.add("active");
  if (name === "servers") loadServers();
  if (name === "users") loadUsers();
  if (name === "bans") loadBans();
  if (name === "ads") loadAds();
  if (name === "staff") loadStaff();
  if (name === "audit") loadAudit();
}

// Servers
let sSearch = "";
async function loadServers(page=1) {
  const d = await API(`/servers?page=${page}&q=${encodeURIComponent(sSearch)}`);
  let h = `<table class="tbl"><tr><th>Name</th><th>IP</th><th>Players</th><th>Votes</th><th>Status</th><th>Actions</th></tr>`;
  d.servers.forEach(s => {
    const status = s.is_banned ? '<span class="badge badge-red">Banned</span>' : s.is_featured ? '<span class="badge badge-purple">Featured</span>' : s.is_online ? '<span class="badge badge-green">Online</span>' : '<span class="badge badge-red">Offline</span>';
    h += `<tr>
      <td style="font-weight:700;color:var(--text)">${esc(s.name)}</td>
      <td><code>${esc(s.ip)}</code></td>
      <td>${s.player_count||0}</td>
      <td>${s.total_votes||0}</td>
      <td>${status}</td>
      <td style="display:flex;gap:4px;flex-wrap:wrap">
        ${!s.is_featured ? `<button class="sm-btn sm-btn-green" onclick="featureServer('${s.id}')">Feature</button>` : `<button class="sm-btn" onclick="unfeatureServer('${s.id}')">Unfeature</button>`}
        ${!s.is_banned ? `<button class="sm-btn sm-btn-red" onclick="banServer('${s.id}')">Ban</button>` : `<button class="sm-btn sm-btn-green" onclick="unbanServer('${s.id}')">Unban</button>`}
      </td>
    </tr>`;
  });
  h += "</table>";
  document.getElementById("servers-table").innerHTML = h;
}
function searchServers() { sSearch = document.getElementById("server-search").value; loadServers(); }
async function featureServer(id) { await API(`/servers/${id}/feature`, {method:"POST"}); showToast("Server featured for 30 days"); loadServers(); }
async function unfeatureServer(id) { await API(`/servers/${id}/feature`, {method:"DELETE"}); showToast("Server unfeatured"); loadServers(); }
async function banServer(id) {
  const reason = prompt("Ban reason:");
  if (!reason) return;
  await API(`/servers/${id}/ban`, {method:"POST", body:JSON.stringify({reason})});
  showToast("Server banned"); loadServers();
}
async function unbanServer(id) { await API(`/servers/${id}/ban`, {method:"DELETE"}); showToast("Server unbanned"); loadServers(); }

// Users
let uSearch = "";
async function loadUsers(page=1) {
  const d = await API(`/users?page=${page}&q=${encodeURIComponent(uSearch)}`);
  let h = `<table class="tbl"><tr><th>User</th><th>Email</th><th>Provider</th><th>Status</th><th>Actions</th></tr>`;
  d.users.forEach(u => {
    const status = u.is_banned ? '<span class="badge badge-red">Banned</span>' : '<span class="badge badge-green">Active</span>';
    h += `<tr>
      <td style="font-weight:700;color:var(--text)">${esc(u.username||"—")}</td>
      <td>${esc(u.email||"—")}</td>
      <td>${u.oauth_provider}</td>
      <td>${status}</td>
      <td>
        ${!u.is_banned ? `<button class="sm-btn sm-btn-red" onclick="banUser('${u.id}')">Ban</button>` : `<button class="sm-btn sm-btn-green" onclick="unbanUser('${u.id}')">Unban</button>`}
      </td>
    </tr>`;
  });
  h += "</table>";
  document.getElementById("users-table").innerHTML = h;
}
function searchUsers() { uSearch = document.getElementById("user-search").value; loadUsers(); }
async function banUser(id) {
  const reason = prompt("Ban reason:");
  if (!reason) return;
  await API(`/users/${id}/ban`, {method:"POST", body:JSON.stringify({reason})});
  showToast("User banned"); loadUsers();
}
async function unbanUser(id) { await API(`/users/${id}/ban`, {method:"DELETE"}); showToast("User unbanned"); loadUsers(); }

// Bans
async function loadBans() {
  const bans = await API("/bans");
  let h = `<table class="tbl"><tr><th>Type</th><th>Target</th><th>Reason</th><th>Date</th></tr>`;
  bans.forEach(b => {
    h += `<tr><td><span class="badge badge-red">${b.target_type}</span></td><td>${b.target_id||b.target_ip||"—"}</td><td>${esc(b.reason)}</td><td>${new Date(b.created_at).toLocaleDateString()}</td></tr>`;
  });
  h += "</table>";
  document.getElementById("bans-table").innerHTML = h;
}

// Ads
async function loadAds() {
  const ads = await API("/ads");
  let h = `<table class="tbl"><tr><th>Name</th><th>Placement</th><th>Clicks</th><th>Impressions</th><th>Status</th><th>Actions</th></tr>`;
  ads.forEach(a => {
    const status = a.is_active ? '<span class="badge badge-green">Active</span>' : '<span class="badge badge-red">Inactive</span>';
    h += `<tr>
      <td style="font-weight:700;color:var(--text)">${esc(a.name)}</td>
      <td>${a.placement}</td>
      <td>${a.clicks||0}</td>
      <td>${a.impressions||0}</td>
      <td>${status}</td>
      <td style="display:flex;gap:4px">
        <button class="sm-btn" onclick="toggleAd('${a.id}',${!a.is_active})">${a.is_active?"Disable":"Enable"}</button>
        <button class="sm-btn sm-btn-red" onclick="deleteAd('${a.id}')">Delete</button>
      </td>
    </tr>`;
  });
  h += "</table>";
  document.getElementById("ads-table").innerHTML = h;
}
function showAdForm() { document.getElementById("ad-form-wrap").style.display = ""; }
async function createAd() {
  await API("/ads", { method:"POST", body:JSON.stringify({
    name: document.getElementById("ad-name").value,
    href: document.getElementById("ad-href").value,
    image_url: document.getElementById("ad-image").value,
    placement: document.getElementById("ad-placement").value
  })});
  document.getElementById("ad-form-wrap").style.display = "none";
  showToast("Ad created"); loadAds();
}
async function toggleAd(id, active) { await API(`/ads/${id}`, {method:"PUT", body:JSON.stringify({is_active:active})}); loadAds(); }
async function deleteAd(id) { if(!confirm("Delete this ad?")) return; await API(`/ads/${id}`, {method:"DELETE"}); showToast("Ad deleted"); loadAds(); }

// Staff
async function loadStaff() {
  const staff = await API("/staff").catch(() => []);
  if (!Array.isArray(staff)) { document.getElementById("staff-table").innerHTML = '<div style="padding:20px;color:var(--text-d)">Insufficient permissions</div>'; return; }
  let h = `<table class="tbl"><tr><th>Username</th><th>Name</th><th>Role</th><th>Permissions</th><th>Actions</th></tr>`;
  staff.forEach(s => {
    const perms = (s.permissions||[]).map(p => `<span class="badge badge-amber">${p}</span>`).join(" ");
    h += `<tr>
      <td style="font-weight:700;color:var(--text)">${esc(s.username)}</td>
      <td>${esc(s.display_name||"—")}</td>
      <td><span class="badge badge-purple">${s.role}</span></td>
      <td>${perms||"—"}</td>
      <td><button class="sm-btn sm-btn-red" onclick="deleteStaffMember('${s.id}')">Remove</button></td>
    </tr>`;
  });
  h += "</table>";
  document.getElementById("staff-table").innerHTML = h;

  // Perms checkboxes
  const pc = document.getElementById("sf-perms");
  pc.innerHTML = PERMS.map(p => `<label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-m);cursor:pointer"><input type="checkbox" value="${p}"> ${p}</label>`).join("");
}
function showStaffForm() { document.getElementById("staff-form-wrap").style.display = ""; }
async function createStaff() {
  const perms = [...document.querySelectorAll("#sf-perms input:checked")].map(i => i.value);
  await API("/staff", { method:"POST", body:JSON.stringify({
    username: document.getElementById("sf-user").value,
    password: document.getElementById("sf-pass").value,
    display_name: document.getElementById("sf-name").value,
    role: document.getElementById("sf-role").value,
    permissions: perms
  })});
  document.getElementById("staff-form-wrap").style.display = "none";
  showToast("Staff member created"); loadStaff();
}
async function deleteStaffMember(id) { if(!confirm("Remove this staff member?")) return; await API(`/staff/${id}`, {method:"DELETE"}); showToast("Staff removed"); loadStaff(); }

// Audit
async function loadAudit() {
  const logs = await API("/audit").catch(() => []);
  if (!Array.isArray(logs)) { document.getElementById("audit-table").innerHTML = '<div style="padding:20px;color:var(--text-d)">Insufficient permissions</div>'; return; }
  let h = `<table class="tbl"><tr><th>Time</th><th>Actor</th><th>Action</th><th>Target</th><th>Details</th></tr>`;
  logs.forEach(l => {
    h += `<tr>
      <td style="font-size:12px">${new Date(l.created_at).toLocaleString()}</td>
      <td>${l.actor_type}:${(l.actor_id||"").slice(0,8)}</td>
      <td style="font-weight:700;color:var(--text)">${l.action}</td>
      <td>${l.target_type||"—"}:${(l.target_id||"").slice(0,8)}</td>
      <td style="font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis">${JSON.stringify(l.details||{})}</td>
    </tr>`;
  });
  h += "</table>";
  document.getElementById("audit-table").innerHTML = h;
}

function esc(s) { const d=document.createElement("div"); d.textContent=s||""; return d.innerHTML; }
async function staffLogout() { await fetch("/auth/staff/logout",{method:"POST"}); window.location.href="/admin/login"; }

// Init
loadServers();
